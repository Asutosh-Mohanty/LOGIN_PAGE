<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GlowCart</title>
    <link rel="stylesheet" href="../CSS/auth.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Back to Home -->
    <a href="index.html" class="back-home">
        <i class='bx bx-arrow-back'></i> Back to Home
    </a>

    <div class="auth-container">
        <div class="auth-box">
            <div class="brand">
                <i class='bx bx-smile'></i>
                <h1>GlowCart</h1>
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Login to continue your skincare journey</p>

            <form id="loginForm" novalidate>
                <!-- Username -->
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class='bx bxs-user'></i>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                    <span class="error-msg" id="usernameError">Please enter your username</span>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class='bx bxs-lock-alt'></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                    </div>
                    <span class="error-msg" id="passwordError">Password must be at least 6 characters</span>
                </div>

                <!-- Remember & Forgot -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="loginBtn">
                    <span class="btn-text" id="btnText">Login</span>
                    <span class="spinner" id="spinner"></span>
                </button>
            </form>

            <!-- Register Link -->
            <p class="switch-auth">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>

        <!-- Side Image -->
        <div class="auth-visual">
            <div class="visual-content">
                <h3>Start Your Glow Journey</h3>
                <p>Join thousands of happy customers achieving radiant skin</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="../JS/auth.js"></script>
</body>
</html>
